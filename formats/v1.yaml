# Formatka v1 — DEKLARATYWNA. Podmiana tego pliku NIE wymaga zmian w silniku (S1).
name: slayer-dataset-format
version: 1
text_fields: [text]         # skąd checki biorą tekst (lista; wspiera nested np. messages[].content)
id_field: id
license_field: license      # licencja PER DOKUMENT/ŹRÓDŁO (opcjonalna; dynaword/speakleash)
source_field: source        # provenance per rekord — grupuje licencje per źródło w raporcie

card_schema:
  fields:
    name:               {type: str,  required: true}
    version:            {type: str,  required: true}
    license:            {type: str,  required: true}      # licencja TEKSTU/danych (źródło)
    collection_license: {type: str,  required: false}     # licencja kolekcji/metadanych (domyślnie CC0)
    visibility:         {type: str,  required: true, enum: [internal, external]}
    format:             {type: str,  required: false}     # którą formatkę użyć (domyślnie v1)
    source_manifest:    {type: str,  required: false}     # plik mapy źródło→licencja (sources.yaml) obok karty
    source_url:         {type: str,  required: true}
    sha256:             {type: str,  required: false}
    sample:             {type: str,  required: true}
    records:            {type: int,  required: false}
    bytes:              {type: int,  required: false}

record_schema:
  fields:
    id:          {type: str,  required: false}
    text:        {type: str,  required: true}
    speaker:     {type: str,  required: false}
    date:        {type: str,  required: false}
    term:        {type: str,  required: false}
    word_count:  {type: int,  required: false}
    source:      {type: str,  required: false}    # provenance per rekord (grupowanie licencji)
    license:     {type: str,  required: false}    # licencja PER DOKUMENT (SPDX); brak → parasol karty

checks: [license, uniqueid, empty, pii, dedup, decontam, stats, integrity]
