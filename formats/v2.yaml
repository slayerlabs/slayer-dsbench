# Formatka v2 — DOWÓD modularności (S1): dodane wymagane pole `speaker_count`,
# zmieniony enum widoczności. TEN SAM silnik, ZERO zmian w kodzie (git diff engine/ = 0).
name: slayer-dataset-format
version: 2
text_field: text

card_schema:
  fields:
    name:        {type: str,  required: true}
    version:     {type: str,  required: true}
    license:     {type: str,  required: true}
    visibility:  {type: str,  required: true, enum: [internal, external, restricted]}
    source_url:  {type: str,  required: true}
    sha256:      {type: str,  required: false}
    sample:      {type: str,  required: true}
    records:     {type: int,  required: false}
    bytes:       {type: int,  required: false}

record_schema:
  fields:
    text:          {type: str,  required: true}
    speaker:       {type: str,  required: false}
    speaker_count: {type: int,  required: true}     # NOWE wymagane pole (v2)
    date:          {type: str,  required: false}
    term:          {type: str,  required: false}
    word_count:    {type: int,  required: false}

checks: [license, pii, dedup, decontam, stats, integrity]
