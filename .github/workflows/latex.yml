name: Build PDF (paper)

# Buduje raport paper/ do PDF + lint: matematyka zawsze w LaTeX, nigdy unicode.
# Formatka osobno od treści (paper/formatka vs paper/tresc).

on:
  push:
    paths:
      - 'paper/**'
      - 'docs/**'
      - 'scripts/lint-math-unicode.py'
      - '.github/workflows/latex.yml'
  pull_request:
    paths:
      - 'paper/**'
      - 'docs/**'
      - 'scripts/lint-math-unicode.py'
      - '.github/workflows/latex.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint — matematyka zawsze w LaTeX, nigdy unicode (tex + docs)
        run: python3 scripts/lint-math-unicode.py paper docs README.md

      - name: Kompilacja paper → PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: main.tex

      - name: Wystaw PDF jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: speakleash-live-audit-pdf
          path: paper/main.pdf
          if-no-files-found: error
